<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Alpha Centauri System - Interactive 3D Visualization</title>
    <style>
        /* ─── Reset & Base ─── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            overflow: hidden;
            font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            color: #fff;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
            position: relative;
        }
        canvas {
            display: block;
        }

        /* ─── Loading Screen ─── */
        #loading {
            position: fixed;
            inset: 0;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0a0a12;
            color: #f0f0ff;
            font-weight: 300;
            letter-spacing: 2px;
            transition: opacity 1.2s ease;
        }
        #loading.hidden {
            opacity: 0;
            pointer-events: none;
        }
        #loading .spinner {
            width: 60px;
            height: 60px;
            border: 2px solid rgba(255, 255, 255, 0.05);
            border-top: 2px solid #f9d77e;
            border-radius: 50%;
            animation: spin 1.2s cubic-bezier(0.6, 0, 0.4, 1) infinite;
            margin-bottom: 28px;
        }
        #loading h1 {
            font-size: 24px;
            font-weight: 300;
            letter-spacing: 6px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #f9d77e, #ff8a5c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        #loading p {
            font-size: 13px;
            opacity: 0.5;
            letter-spacing: 4px;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ─── UI Overlay ─── */
        #ui {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 100;
        }
        #ui>* {
            pointer-events: auto;
        }

        /* ─── Top Bar ─── */
        #top-bar {
            position: absolute;
            top: 18px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(10, 10, 20, 0.55);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.10);
            border-radius: 14px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.45);
        }
        #top-bar b {
            color: #f9d77e;
        }

        /* ─── Bottom Controls ─── */
        #bottom-bar {
            position: absolute;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(10, 10, 20, 0.5);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 32px;
            padding: 6px 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }
        #bottom-bar button {
            background: rgba(255, 255, 255, 0.04);
            border: none;
            color: rgba(255, 255, 255, 0.6);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 400;
            cursor: pointer;
            transition: all 0.25s ease;
            font-family: inherit;
            white-space: nowrap;
            border: 1px solid transparent;
        }
        #bottom-bar button:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
        }
        #bottom-bar button.active {
            background: rgba(249, 215, 126, 0.12);
            color: #f9d77e;
            border-color: rgba(249, 215, 126, 0.15);
        }
        #bottom-bar .sep {
            width: 1px;
            height: 20px;
            background: rgba(255, 255, 255, 0.06);
        }
        #bottom-bar .cam-label {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.25);
            margin-right: 4px;
            letter-spacing: 0.5px;
        }

        /* ─── Info Panel ─── */
        #info-panel {
            position: absolute;
            bottom: 90px;
            right: 28px;
            width: 300px;
            max-width: calc(100vw - 56px);
            background: rgba(8, 8, 18, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 22px 26px;
            box-shadow: 0 16px 64px rgba(0, 0, 0, 0.7);
            transform: translateY(12px);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
            pointer-events: none;
        }
        #info-panel.visible {
            transform: translateY(0);
            opacity: 1;
            pointer-events: auto;
        }
        #info-panel .close-btn {
            position: absolute;
            top: 12px;
            right: 14px;
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.25);
            font-size: 18px;
            cursor: pointer;
            transition: color 0.2s;
            font-family: inherit;
        }
        #info-panel .close-btn:hover {
            color: #fff;
        }
        #info-panel .name {
            font-size: 22px;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
            background: linear-gradient(135deg, #f9d77e, #ff8a5c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        #info-panel .sub {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 14px;
            letter-spacing: 0.3px;
        }
        #info-panel .props {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4px 16px;
            font-size: 13px;
        }
        #info-panel .props .label {
            color: rgba(255, 255, 255, 0.3);
            font-weight: 300;
        }
        #info-panel .props .value {
            color: rgba(255, 255, 255, 0.85);
            font-weight: 400;
            text-align: right;
        }
        #info-panel .fact {
            margin-top: 14px;
            padding-top: 14px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 13px;
            color: #e2e8f0;
            font-style: italic;
        }

        /* ─── Search ─── */
        #search-box {
            position: absolute;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            width: 250px;
            background: rgba(10, 10, 20, 0.8);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 8px 12px;
            display: none;
            flex-direction: column;
            gap: 8px;
            z-index: 150;
        }
        #search-box.open {
            display: flex;
        }
        #search-box input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            color: #fff;
            padding: 6px 10px;
            font-size: 12px;
            outline: none;
        }
        #search-results {
            max-height: 150px;
            overflow-y: auto;
        }
        .search-item {
            padding: 6px;
            font-size: 12px;
            cursor: pointer;
            border-radius: 4px;
        }
        .search-item:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        #top-bar .brand {
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #f9d77e, #ff8a5c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-right: 6px;
            white-space: nowrap;
            padding: 8px 20px;
        }
        #top-bar .sep {
            width: 1px;
            height: 22px;
            background: rgba(255, 255, 255, 0.08);
        }
        #top-bar .control-group {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 0 12px;
        }
        #top-bar button {
            background: rgba(255, 255, 255, 0.04);
            border: none;
            color: rgba(255, 255, 255, 0.7);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 400;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.25s ease;
            font-family: inherit;
            white-space: nowrap;
            border: 1px solid transparent;
        }
        #top-bar button:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border-color: rgba(255, 255, 255, 0.08);
        }
        #top-bar button.active {
            background: rgba(249, 215, 126, 0.15);
            color: #f9d77e;
            border-color: rgba(249, 215, 126, 0.2);
        }
        #top-bar button.icon-btn {
            width: 32px;
            height: 32px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            border-radius: 50%;
        }
        #top-bar input[type="range"] {
            width: 60px;
            height: 3px;
            -webkit-appearance: none;
            appearance: none;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 4px;
            outline: none;
            transition: background 0.2s;
        }
        #top-bar input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #f9d77e;
            cursor: pointer;
            box-shadow: 0 0 12px rgba(249, 215, 126, 0.3);
        }
        #top-bar input[type="range"]::-moz-range-thumb {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #f9d77e;
            cursor: pointer;
            border: none;
        }
        #top-bar .speed-label {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
            min-width: 28px;
            text-align: center;
            font-variant-numeric: tabular-nums;
        }

        #top-bar .close-search {
            color: rgba(255, 255, 255, 0.2);
            cursor: pointer;
            font-size: 16px;
            transition: color 0.2s;
            background: none;
            border: none;
            font-family: inherit;
        }
        #top-bar .close-search:hover {
            color: #fff;
        }

        /* ─── Responsive ─── */
        @media (max-width: 768px) {
            #top-bar {
                top: 12px;
                padding: 5px 12px;
                gap: 6px;
                flex-wrap: nowrap;
                overflow-x: auto;
                max-width: calc(100vw - 16px);
                border-radius: 28px;
            }
            #top-bar .brand {
                font-size: 11px;
                letter-spacing: 1px;
                padding: 4px 8px;
            }
            #top-bar .sep {
                display: none;
            }
            #top-bar button {
                font-size: 10px;
                padding: 3px 10px;
            }
            #top-bar input[type="range"] {
                width: 40px;
            }
            #bottom-bar {
                bottom: 16px;
                padding: 4px 12px;
                gap: 4px;
                flex-wrap: nowrap;
                overflow-x: auto;
                max-width: calc(100vw - 16px);
                border-radius: 24px;
            }
            #bottom-bar button {
                font-size: 10px;
                padding: 4px 10px;
            }
            #bottom-bar .cam-label {
                font-size: 9px;
            }
            #info-panel {
                bottom: 72px;
                right: 12px;
                width: calc(100vw - 24px);
                padding: 16px 18px;
            }
            #info-panel .name {
                font-size: 18px;
            }
            #info-panel .props {
                font-size: 12px;
                gap: 2px 10px;
            }
            #search-box {
                top: 68px;
                width: calc(100vw - 32px);
                padding: 6px 14px;
            }
        }
    </style>
</head>
<body>

    <!-- Loading -->
    <div id="loading">
        <div class="spinner"></div>
        <h1>Alpha Centauri</h1>
        <p>Loading stellar system …</p>
    </div>

    <!-- Main Container -->
    <div id="canvas-container"></div>

    <!-- UI -->
    <div id="ui">

        <!-- Top Bar -->
        <div id="top-bar">
            <span class="brand">✦ ALPHA CENTAURI</span>
            <span class="sep"></span>
            <div class="control-group">
                <button id="btn-pause" class="icon-btn" title="Pause/Play">⏸</button>
                <button id="btn-reset" class="icon-btn" title="Reset View">⟲</button>
                <button id="btn-search" class="icon-btn" title="Search">⌕</button>
            </div>
            <span class="sep"></span>
            <div class="control-group">
                <span style="font-size:11px;color:rgba(255,255,255,0.3);">Speed</span>
                <input type="range" id="speed-slider" min="0" max="3" step="0.05" value="1" />
                <span class="speed-label" id="speed-display">1.0×</span>
            </div>
        </div>

        <!-- Search -->
        <div id="search-box">
            <input type="text" id="search-input" placeholder="Search objects…" autocomplete="off" />
            <button class="close-search" id="close-search">✕</button>
            <div id="search-results"></div>
        </div>

        <!-- Bottom Bar -->
        <div id="bottom-bar">
            <span class="cam-label">CAM</span>
            <button class="active" data-cam="free">Free</button>
            <button data-cam="fly">Fly</button>
            <button data-cam="follow">Follow</button>
            <button data-cam="cinematic">Cinematic</button>
            <button data-cam="first">First Person</button>
            <span class="sep"></span>
            <button id="btn-orbits" class="active">Orbits</button>
            <button id="btn-labels" class="active">Labels</button>
        </div>

        <!-- Info Panel -->
        <div id="info-panel">
            <button class="close-btn" id="info-close">✕</button>
            <h2 class="name" id="info-name">Alpha Centauri A</h2>
            <div class="sub" id="info-sub">Class G2V Star</div>
            <div class="props" id="info-props"></div>
            <div class="fact" id="info-fact"></div>
        </div>

    </div>

    <!-- ─── Three.js ─── -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        // IMPORTS
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        // STATE
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        const state = {
            paused: false,
            speed: 1,
            time: 0,
            camMode: 'free',
            showOrbits: true,
            showLabels: true,
            selected: null,
            followTarget: null,
            cinematicPhase: 0,
        };

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        // SCENE SETUP
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();

        // Camera
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.set(18, 12, 26);

        // Renderer
        const renderer = new THREE.WebGLRenderer({
            antialias: true,
            alpha: false,
            powerPreference: "high-performance"
        });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        container.appendChild(renderer.domElement);

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        // POST-PROCESSING
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        const composer = new EffectComposer(renderer);
        const renderPass = new RenderPass(scene, camera);
        composer.addPass(renderPass);

        const bloomPass = new UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight),
            0.6, // strength
            0.4, // radius
            0.15 // threshold
        );
        composer.addPass(bloomPass);

        const outputPass = new OutputPass();
        composer.addPass(outputPass);

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        // CONTROLS
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.08;
        controls.minDistance = 2;
        controls.maxDistance = 300;
        controls.autoRotate = false;
        controls.autoRotateSpeed = 0.3;
        controls.target.set(0, 0, 0);
        controls.update();

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        // LIGHTING
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        const ambientLight = new THREE.AmbientLight(0x111122, 0.15);
        scene.add(ambientLight);

        // Key light from Alpha Centauri A
        const starLight = new THREE.PointLight(0xffdd99, 40, 150);
        starLight.position.set(0, 0, 0);
        starLight.castShadow = true;
        starLight.shadow.mapSize.width = 1024;
        starLight.shadow.mapSize.height = 1024;
        scene.add(starLight);

        const fillLight = new THREE.DirectionalLight(0x4466ff, 0.08);
        fillLight.position.set(-20, 30, -10);
        scene.add(fillLight);

        const rimLight = new THREE.DirectionalLight(0xff8844, 0.06);
        rimLight.position.set(10, -5, -30);
        scene.add(rimLight);

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        // BACKGROUND STARS (twinkling)
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        function createStarField() {
            const count = 12000;
            const positions = new Float32Array(count * 3);
            const colors = new Float32Array(count * 3);
            const sizes = new Float32Array(count);
            const twinkleSpeeds = new Float32Array(count);
            const twinkleOffsets = new Float32Array(count);

            for (let i = 0; i < count; i++) {
                const r = 50 + Math.random() * 450;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                positions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
                positions[i * 3 + 1] = r * Math.cos(phi);
                positions[i * 3 + 2] = r * Math.sin(phi) * Math.sin(theta);

                const temp = 0.6 + Math.random() * 0.4;
                const c = new THREE.Color().setHSL(0.08 + Math.random() * 0.05, 0.3, temp * 0.8 + 0.2);
                colors[i * 3] = c.r;
                colors[i * 3 + 1] = c.g;
                colors[i * 3 + 2] = c.b;

                sizes[i] = 0.3 + Math.random() * 0.8;
                twinkleSpeeds[i] = 0.5 + Math.random() * 2;
                twinkleOffsets[i] = Math.random() * Math.PI * 2;
            }

            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            geo.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
            geo.setAttribute('twinkleSpeed', new THREE.BufferAttribute(twinkleSpeeds, 1));
            geo.setAttribute('twinkleOffset', new THREE.BufferAttribute(twinkleOffsets, 1));

            const mat = new THREE.ShaderMaterial({
                uniforms: {
                    uTime: { value: 0 }
                },
                vertexShader: `
              attribute float size;
              attribute float twinkleSpeed;
              attribute float twinkleOffset;
              attribute vec3 color;
              varying vec3 vColor;
              uniform float uTime;
              void main() {
                vColor = color;
                vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
                float twinkle = 0.6 + 0.4 * sin(uTime * twinkleSpeed + twinkleOffset);
                gl_PointSize = size * (120.0 / -mvPos.z) * twinkle;
                gl_Position = projectionMatrix * mvPos;
              }
            `,
                fragmentShader: `
              varying vec3 vColor;
              void main() {
                float d = length(gl_PointCoord - 0.5);
                if (d > 0.5) discard;
                float alpha = 1.0 - smoothstep(0.0, 0.5, d);
                float glow = exp(-d * 10.0);
                vec3 col = vColor * (1.0 + 0.5 * glow);
                gl_FragColor = vec4(col, alpha * 0.9);
              }
            `,
                transparent: true,
                depthWrite: false,
                blending: THREE.AdditiveBlending,
            });

            const points = new THREE.Points(geo, mat);
            scene.add(points);
            return points;
        }

        const starField = createStarField();

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        // STAR SYSTEM DATA
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        const STAR_DATA = {

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        // CREATE STARS
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        const starObjects = {};
        const starGroup = new THREE.Group();
        scene.add(starGroup);

        const barycenterGroup = new THREE.Group();
        starGroup.add(barycenterGroup);

        const baryGeo = new THREE.SphereGeometry(0.08, 16, 16);
        const baryMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.4 });
        const baryMesh = new THREE.Mesh(baryGeo, baryMat);
        barycenterGroup.add(baryMesh);

        const ringGeo = new THREE.RingGeometry(0.15, 0.25, 32);
        const ringMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.15, side: THREE.DoubleSide });
        const ringMesh = new THREE.Mesh(ringGeo, ringMat);
        ringMesh.lookAt(camera.position);
        barycenterGroup.add(ringMesh);

        function createStar(data, id) {
            const group = new THREE.Group();
            const geo = new THREE.SphereGeometry(data.size * 0.7, 48, 48);
            const mat = new THREE.MeshStandardMaterial({
                color: data.color,
                emissive: data.emissive,
                emissiveIntensity: 0.6,
                roughness: 0.2,
                metalness: 0.0,
            });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.castShadow = false;
            group.add(mesh);

            const coronaGeo = new THREE.SphereGeometry(data.size * 1.5, 32, 32);
            const coronaMat = new THREE.ShaderMaterial({
                uniforms: {
                    uColor: { value: new THREE.Color(data.color) },
                    uTime: { value: 0 },
                },
                vertexShader: `
              varying vec3 vNormal;
              varying vec3 vViewDir;
              void main() {
                vNormal = normalize(normalMatrix * normal);
                vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
                vViewDir = normalize(-mvPos.xyz);
                gl_Position = projectionMatrix * mvPos;
              }
            `,
                fragmentShader: `
              uniform vec3 uColor;
              uniform float uTime;
              varying vec3 vNormal;
              varying vec3 vViewDir;
              void main() {
                float rim = 1.0 - max(0.0, dot(vNormal, vViewDir));
                float glow = pow(rim, 2.5) * 1.2;
                float pulse = 0.95 + 0.05 * sin(uTime * 0.4 + 1.2);
                float alpha = glow * 0.45 * pulse;
                vec3 col = uColor * (1.0 + 0.2 * rim);
                gl_FragColor = vec4(col, alpha);
              }
            `,
                transparent: true,
                depthWrite: false,
                blending: THREE.AdditiveBlending,
                side: THREE.FrontSide,
            });
            const corona = new THREE.Mesh(coronaGeo, coronaMat);
            group.add(corona);

            const outerGeo = new THREE.SphereGeometry(data.size * 2.8, 24, 24);
            const outerMat = new THREE.ShaderMaterial({
                uniforms: {
                    uColor: { value: new THREE.Color(data.color) },
                    uTime: { value: 0 },
                },
                vertexShader: `
              varying vec3 vNormal;
              varying vec3 vViewDir;
              void main() {
                vNormal = normalize(normalMatrix * normal);
                vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
                vViewDir = normalize(-mvPos.xyz);
                gl_Position = projectionMatrix * mvPos;
              }
            `,
                fragmentShader: `
              uniform vec3 uColor;
              uniform float uTime;
              varying vec3 vNormal;
              varying vec3 vViewDir;
              void main() {
                float rim = 1.0 - max(0.0, dot(vNormal, vViewDir));
                float glow = pow(rim, 4.0) * 0.6;
                float pulse = 0.9 + 0.1 * sin(uTime * 0.2 + 2.3);
                float alpha = glow * 0.15 * pulse;
                gl_FragColor = vec4(uColor, alpha);
              }
            `,
                transparent: true,
                depthWrite: false,
                blending: THREE.AdditiveBlending,
            });
            const outer = new THREE.Mesh(outerGeo, outerMat);
            group.add(outer);

            const spriteMat = new THREE.SpriteMaterial({
                map: TextureFactory_glowSprite ? TextureFactory_glowSprite() : null,
                color: data.color,
                transparent: true,
                opacity: 0.3,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });
            const sprite = new THREE.Sprite(spriteMat);
            sprite.scale.set(data.size * 10, data.size * 10, 1);
            group.add(sprite);

            group.userData = { mesh, corona, outer, sprite };
            starObjects[id] = group;
            starGroup.add(group);
            return group;
        }

        // Texture generators as backup fallback
        function TextureFactory_glowSprite() {
            const canvas = document.createElement('canvas');
            canvas.width = 128;
            canvas.height = 128;
            const ctx = canvas.getContext('2d');
            const g = ctx.createRadialGradient(64, 64, 0, 64, 64, 64);
            g.addColorStop(0, 'rgba(255,255,255,1)');
            g.addColorStop(0.2, 'rgba(255,255,255,0.8)');
            g.addColorStop(0.5, 'rgba(255,255,255,0.2)');
            g.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.fillStyle = g;
            ctx.fillRect(0, 0, 128, 128);
            const tex = new THREE.CanvasTexture(canvas);
            return tex;
        }

        const starPositions = {
            alphaA: new THREE.Vector3(-1.5, 0, 0),
            alphaB: new THREE.Vector3(1.5, 0, 0),
            proxima: new THREE.Vector3(28, 6, 12),
        };

        const aGroup = createStar(STAR_DATA.alphaA, 'alphaA');
        aGroup.position.copy(starPositions.alphaA);

        const bGroup = createStar(STAR_DATA.alphaB, 'alphaB');
        bGroup.position.copy(starPositions.alphaB);

        const pGroup = createStar(STAR_DATA.proxima, 'proxima');
        pGroup.position.copy(starPositions.proxima);

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        // ORBIT TRAILS
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        const orbitLines = {};

        function createOrbitLine(center, radius, color, segments = 120, eccentricity = 0, angle = 0) {
            const points = [];
            const a = radius;
            const b = radius * (1 - eccentricity);
            for (let i = 0; i <= segments; i++) {
                const t = (i / segments) * Math.PI * 2;
                const x = a * Math.cos(t) * Math.cos(angle) - b * Math.sin(t) * Math.sin(angle);
                const z = a * Math.cos(t) * Math.sin(angle) + b * Math.sin(t) * Math.cos(angle);
                points.push(new THREE.Vector3(x + center.x, 0, z + center.z));
            }
            const geo = new THREE.BufferGeometry().setFromPoints(points);
            const mat = new THREE.LineBasicMaterial({
                color: color,
                transparent: true,
                opacity: 0.25,
                blending: THREE.AdditiveBlending,
            });
            const line = new THREE.Line(geo, mat);
            return line;
        }

        const binOrbit = createOrbitLine(new THREE.Vector3(0, 0, 0), 3.2, 0xffaa55, 120, 0.25, 0.3);
        starGroup.add(binOrbit);
        orbitLines.binary = binOrbit;

        const proxOrbit = createOrbitLine(new THREE.Vector3(0, 0, 0), 30, 0xff5533, 200, 0.05, 0.8);
        starGroup.add(proxOrbit);
        orbitLines.proxima = proxOrbit;

        const planetOrbits = {};

        function createPlanetOrbit(parentPos, radius, color, segments = 80) {
            const points = [];
            for (let i = 0; i <= segments; i++) {
                const t = (i / segments) * Math.PI * 2;
                const x = radius * Math.cos(t);
                const z = radius * Math.sin(t);
                points.push(new THREE.Vector3(x + parentPos.x, 0, z + parentPos.z));
            }
            const geo = new THREE.BufferGeometry().setFromPoints(points);
            const mat = new THREE.LineBasicMaterial({
                color: color,
                transparent: true,
                opacity: 0.15,
                blending: THREE.AdditiveBlending,
            });
            const line = new THREE.Line(geo, mat);
            return line;
        }

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        // PLANETS
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        const planetObjects = {};

        function createPlanet(data, id, parentPos) {
            const group = new THREE.Group();
            const tex = generatePlanetTexture(data.color, data.type);
            const geo = new THREE.SphereGeometry(data.size, 32, 32);
            const mat = new THREE.MeshStandardMaterial({
                map: tex,
                roughness: 0.6 + Math.random() * 0.3,
                metalness: 0.05 + Math.random() * 0.1,
                emissive: new THREE.Color(data.color).multiplyScalar(0.02),
                emissiveIntensity: 0.1,
            });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            group.add(mesh);

            const atmoGeo = new THREE.SphereGeometry(data.size * 1.12, 24, 24);
            const atmoMat = new THREE.ShaderMaterial({
                uniforms: {
                    uColor: { value: new THREE.Color(data.color) },
                },
                vertexShader: `
              varying vec3 vNormal;
              varying vec3 vViewDir;
              void main() {
                vNormal = normalize(normalMatrix * normal);
                vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
                vViewDir = normalize(-mvPos.xyz);
                gl_Position = projectionMatrix * mvPos;
              }
            `,
                fragmentShader: `
              uniform vec3 uColor;
              varying vec3 vNormal;
              varying vec3 vViewDir;
              void main() {
                float rim = 1.0 - max(0.0, dot(vNormal, vViewDir));
                float alpha = pow(rim, 3.0) * 0.2;
                gl_FragColor = vec4(uColor, alpha);
              }
            `,
                transparent: true,
                depthWrite: false,
                blending: THREE.AdditiveBlending,
                side: THREE.FrontSide,
            });
            const atmo = new THREE.Mesh(atmoGeo, atmoMat);
            group.add(atmo);

            group.position.copy(parentPos);
            group.userData = { data, id, mesh, mat, atmo };
            planetObjects[id] = group;
            starGroup.add(group);
            return group;
        }

        function generatePlanetTexture(baseColor, type) {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 256;
            const ctx = canvas.getContext('2d');

            const c = new THREE.Color(baseColor);
            const r = c.r * 255 | 0;
            const g = c.g * 255 | 0;
            const b = c.b * 255 | 0;

            ctx.fillStyle = `rgb(${r},${g},${b})`;
            ctx.fillRect(0, 0, 512, 256);

            for (let y = 0; y < 256; y++) {
                for (let x = 0; x < 512; x++) {
                    const n = Math.random();
                    const v = (n - 0.5) * 40;
                    const r2 = Math.max(0, Math.min(255, r + v));
                    const g2 = Math.max(0, Math.min(255, g + v * 0.7));
                    const b2 = Math.max(0, Math.min(255, b + v * 0.5));
                    ctx.fillStyle = `rgb(${r2|0},${g2|0},${b2|0})`;
                    ctx.fillRect(x, y, 1, 1);
                }
            }

            const texture = new THREE.CanvasTexture(canvas);
            return texture;
        }

        const proxB = createPlanet(PLANET_DATA.proximaB, 'proximaB', starPositions.proxima);
        const proxD = createPlanet(PLANET_DATA.proximaD, 'proximaD', starPositions.proxima);
        const alphaAb = createPlanet(PLANET_DATA.alphaAb, 'alphaAb', starPositions.alphaA);

        const planetOrbitRefs = {};
        planetOrbitRefs.proximaB = createPlanetOrbit(starPositions.proxima, PLANET_DATA.proximaB.orbitRadius, 0x88aacc);
        starGroup.add(planetOrbitRefs.proximaB);
        planetOrbitRefs.proximaD = createPlanetOrbit(starPositions.proxima, PLANET_DATA.proximaD.orbitRadius, 0xccaa88);
        starGroup.add(planetOrbitRefs.proximaD);
        planetOrbitRefs.alphaAb = createPlanetOrbit(starPositions.alphaA, PLANET_DATA.alphaAb.orbitRadius, 0xcc8844);
        starGroup.add(planetOrbitRefs.alphaAb);

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        // LABELS (CSS2D)
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        const labelGroup = new THREE.Group();
        scene.add(labelGroup);

        function createLabel(text, position, color = '#ffffff', fontSize = 14) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 256;
            canvas.height = 64;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            if (ctx.roundRect) ctx.roundRect(20, 10, 216, 40, 12);
            else ctx.rect(20, 10, 216, 40);
            ctx.fill();

            ctx.strokeStyle = 'rgba(255,255,255,0.06)';
            ctx.lineWidth = 1;
            if (ctx.roundRect) ctx.roundRect(20, 10, 216, 40, 12);
            else ctx.rect(20, 10, 216, 40);
            ctx.stroke();

            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.font = `${fontSize}px "Segoe UI", Arial, sans-serif`;
            ctx.fillStyle = color;
            ctx.fillText(text, 128, 34);

            const tex = new THREE.CanvasTexture(canvas);
            const mat = new THREE.SpriteMaterial({
                map: tex,
                transparent: true,
                depthTest: false,
                depthWrite: false,
            });
            const sprite = new THREE.Sprite(mat);
            sprite.position.copy(position);
            sprite.scale.set(4, 1.2, 1);
            return sprite;
        }

        const labelRefs = {};
        labelRefs.alphaA = createLabel('α Centauri A', starPositions.alphaA, '#ffdd77');
        labelGroup.add(labelRefs.alphaA);
        labelRefs.alphaB = createLabel('α Centauri B', starPositions.alphaB, '#ffaa55');
        labelGroup.add(labelRefs.alphaB);
        labelRefs.proxima = createLabel('Proxima Centauri', starPositions.proxima, '#ff5533');
        labelGroup.add(labelRefs.proxima);

        labelRefs.proximaB = createLabel('Proxima b', starPositions.proxima.clone().add(new THREE.Vector3(0, 1, 0)), '#88aacc');
        labelGroup.add(labelRefs.proximaB);
        labelRefs.proximaD = createLabel('Proxima d', starPositions.proxima.clone().add(new THREE.Vector3(0, 0.8, 0)), '#ccaa88');
        labelGroup.add(labelRefs.proximaD);
        labelRefs.alphaAb = createLabel('α Cen Ab (hyp.)', starPositions.alphaA.clone().add(new THREE.Vector3(0, 1, 0)), '#cc8844');
        labelGroup.add(labelRefs.alphaAb);

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        // INTERACTION
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        const raycaster = new THREE.Raycaster();
        const pointer = new THREE.Vector2();
        let clickableObjects = [];

        function collectClickables() {
            const items = [];
            for (const [id, group] of Object.entries(starObjects)) {
                const mesh = group.userData.mesh;
                if (mesh) {
                    mesh.userData.clickId = id;
                    mesh.userData.type = 'star';
                    items.push(mesh);
                }
            }
            for (const [id, group] of Object.entries(planetObjects)) {
                const mesh = group.userData.mesh;
                if (mesh) {
                    mesh.userData.clickId = id;
                    mesh.userData.type = 'planet';
                    items.push(mesh);
                }
            }
            return items;
        }
        clickableObjects = collectClickables();

        function getObjectData(id) {
            if (STAR_DATA[id]) return { ...STAR_DATA[id], type: 'star' };
            if (PLANET_DATA[id]) return { ...PLANET_DATA[id], type: 'planet' };
            return null;
        }

        function showInfo(id) {
            const data = getObjectData(id);
            if (!data) return;

            const panel = document.getElementById('info-panel');
            document.getElementById('info-name').textContent = data.name;
            document.getElementById('info-sub').textContent =
                data.type === 'star' ? `Star · ${data.class}` : `Exoplanet · ${data.type}`;

            const props = document.getElementById('info-props');
            const rows = [];
            if (data.mass) rows.push(['Mass', `${data.mass} M☉`]);
            if (data.radius) rows.push(['Radius', `${data.radius} R☉`]);
            if (data.temp) rows.push(['Temperature', `${data.temp} K`]);
            if (data.lum) rows.push(['Luminosity', `${data.lum} L☉`]);
            if (data.dist) rows.push(['Distance', `${data.dist} ly`]);
            if (data.orbitalPeriod && data.orbitalPeriod !== '—') rows.push(['Orbital Period', data.orbitalPeriod]);
            if (data.type === 'planet' && data.orbitRadius) rows.push(['Orbit Radius', `${data.orbitRadius} AU`]);

            props.innerHTML = rows.map(([label, value]) =>
                `<span class="label">${label}</span><span class="value">${value}</span>`
            ).join('');

            document.getElementById('info-fact').textContent = data.fact || '';
            panel.classList.add('visible');

            state.selected = id;
        }

        function hideInfo() {
            document.getElementById('info-panel').classList.remove('visible');
            state.selected = null;
        }

        renderer.domElement.addEventListener('click', (e) => {
            const rect = renderer.domElement.getBoundingClientRect();
            pointer.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
            pointer.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;

            raycaster.setFromCamera(pointer, camera);
            const intersects = raycaster.intersectObjects(clickableObjects);

            if (intersects.length > 0) {
                const hit = intersects[0].object;
                const id = hit.userData.clickId;
                if (id) {
                    showInfo(id);
                    if (state.camMode === 'follow') {
                        const obj = starObjects[id] || planetObjects[id];
                        if (obj) state.followTarget = obj;
                    }
                    return;
                }
            }
            hideInfo();
        });

        renderer.domElement.addEventListener('mousemove', (e) => {
            const rect = renderer.domElement.getBoundingClientRect();
            pointer.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
            pointer.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;

            raycaster.setFromCamera(pointer, camera);
            const intersects = raycaster.intersectObjects(clickableObjects);
            renderer.domElement.style.cursor = intersects.length > 0 ? 'pointer' : 'default';
        });

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        // UI CONTROLS
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        document.getElementById('btn-pause').addEventListener('click', () => {
            state.paused = !state.paused;
            document.getElementById('btn-pause').textContent = state.paused ? '▶' : '⏸';
        });

        document.getElementById('btn-reset').addEventListener('click', () => {
            camera.position.set(18, 12, 26);
            controls.target.set(0, 0, 0);
            controls.update();
            hideInfo();
            state.followTarget = null;
        });

        const speedSlider = document.getElementById('speed-slider');
        const speedDisplay = document.getElementById('speed-display');
        speedSlider.addEventListener('input', () => {
            state.speed = parseFloat(speedSlider.value);
            speedDisplay.textContent = state.speed.toFixed(1) + '×';
        });

        document.querySelectorAll('[data-cam]').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('[data-cam]').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                state.camMode = btn.dataset.cam;
                if (state.camMode === 'free') {
                    controls.autoRotate = false;
                    state.followTarget = null;
                } else if (state.camMode === 'cinematic') {
                    controls.autoRotate = false;
                    state.cinematicPhase = 0;
                } else if (state.camMode === 'follow') {
                    if (state.selected) {
                        const obj = starObjects[state.selected] || planetObjects[state.selected];
                        if (obj) state.followTarget = obj;
                    } else {
                        state.followTarget = starObjects.alphaA;
                    }
                } else if (state.camMode === 'first') {
                    state.followTarget = starObjects.alphaA;
                }
            });
        });

        document.getElementById('btn-orbits').addEventListener('click', function() {
            state.showOrbits = !state.showOrbits;
            this.classList.toggle('active');
            const val = state.showOrbits;
            Object.values(orbitLines).forEach(l => l.visible = val);
            Object.values(planetOrbitRefs).forEach(l => l.visible = val);
        });

        document.getElementById('btn-labels').addEventListener('click', function() {
            state.showLabels = !state.showLabels;
            this.classList.toggle('active');
            labelGroup.visible = state.showLabels;
        });

        document.getElementById('info-close').addEventListener('click', hideInfo);

        // Search
        const searchBox = document.getElementById('search-box');
        const searchInput = document.getElementById('search-input');
        const searchResults = document.getElementById('search-results');

        document.getElementById('btn-search').addEventListener('click', () => {
            searchBox.classList.toggle('open');
            if (searchBox.classList.contains('open')) {
                searchInput.focus();
                searchInput.value = '';
                searchResults.style.display = 'none';
            }
        });

        document.getElementById('close-search').addEventListener('click', () => {
            searchBox.classList.remove('open');
            searchResults.style.display = 'none';
        });

        searchInput.addEventListener('input', () => {
            const query = searchInput.value.toLowerCase().trim();
            if (!query) {
                searchResults.style.display = 'none';
                return;
            }

            const allData = { ...STAR_DATA, ...PLANET_DATA };
            const matches = Object.entries(allData).filter(([id, d]) =>
                d.name.toLowerCase().includes(query)
            );

            if (matches.length === 0) {
                searchResults.innerHTML = '<div style="padding:10px;color:rgba(255,255,255,0.2);font-size:12px;">No results</div>';
                searchResults.style.display = 'block';
                return;
            }

            searchResults.innerHTML = matches.map(([id, d]) =>
                `<div class="search-item" data-id="${id}">
              ${d.name} (${d.type === 'star' ? 'Star' : 'Planet'})
            </div>`
            ).join('');

            searchResults.style.display = 'block';

            searchResults.querySelectorAll('.search-item').forEach(el => {
                el.addEventListener('click', () => {
                    const id = el.dataset.id;
                    showInfo(id);
                    searchBox.classList.remove('open');
                    searchResults.style.display = 'none';
                    const obj = starObjects[id] || planetObjects[id];
                    if (obj) {
                        const pos = obj.position.clone();
                        controls.target.copy(pos);
                        camera.position.copy(pos.clone().add(new THREE.Vector3(3, 2, 5)));
                        controls.update();
                    }
                });
            });
        });

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        // ANIMATION LOOP
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        const clock = new THREE.Clock();
        let elapsed = 0;

        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();
            if (!state.paused) {
                state.time += delta * state.speed * 0.3;
                elapsed += delta;
            }

            // Binary orbit
            const orbitAngle = state.time * 0.15;
            const ecc = 0.25;
            const aRad = 3.2;
            const bRad = aRad * (1 - ecc);

            const angleOffset = 0.3;
            const ax = aRad * Math.cos(orbitAngle + angleOffset);
            const az = bRad * Math.sin(orbitAngle + angleOffset);
            const bx = -aRad * Math.cos(orbitAngle + angleOffset) * 0.7;
            const bz = -bRad * Math.sin(orbitAngle + angleOffset) * 0.7;

            starObjects.alphaA.position.set(ax, 0, az);
            starObjects.alphaB.position.set(bx, 0, bz);

            // Proxima slow orbit
            const proxAngle = state.time * 0.003;
            const proxRad = 30;
            starObjects.proxima.position.set(
                proxRad * Math.cos(proxAngle + 0.8),
                6 + Math.sin(proxAngle * 0.7) * 0.5,
                proxRad * Math.sin(proxAngle + 0.8)
            );

            // Planets
            // Proxima b
            const pbAngle = state.time * 0.35;
            const pbRad = PLANET_DATA.proximaB.orbitRadius;
            const pPos2 = starObjects.proxima.position.clone();
            planetObjects.proximaB.position.set(
                pPos2.x + pbRad * Math.cos(pbAngle),
                pPos2.y + 0.1 * Math.sin(pbAngle * 0.5),
                pPos2.z + pbRad * Math.sin(pbAngle)
            );
            planetObjects.proximaB.userData.mesh.rotation.y += delta * 0.5;

            // Proxima d
            const pdAngle = state.time * 0.55;
            const pdRad = PLANET_DATA.proximaD.orbitRadius;
            const pPos3 = starObjects.proxima.position.clone();
            planetObjects.proximaD.position.set(
                pPos3.x + pdRad * Math.cos(pdAngle + 1.2),
                pPos3.y + 0.15 * Math.sin(pdAngle * 0.7 + 0.5),
                pPos3.z + pdRad * Math.sin(pdAngle + 1.2)
            );
            planetObjects.proximaD.userData.mesh.rotation.y += delta * 0.4;

            // Alpha A b
            const abAngle = state.time * 0.12;
            const abRad = PLANET_DATA.alphaAb.orbitRadius;
            const aPos2 = starObjects.alphaA.position.clone();
            planetObjects.alphaAb.position.set(
                aPos2.x + abRad * Math.cos(abAngle + 0.5),
                aPos2.y + 0.2 * Math.sin(abAngle * 0.3),
                aPos2.z + abRad * Math.sin(abAngle + 0.5)
            );
            planetObjects.alphaAb.userData.mesh.rotation.y += delta * 0.3;

            // Update planet orbit lines
            const orbitParents = [
                { id: 'proximaB', parent: starObjects.proxima, rad: PLANET_DATA.proximaB.orbitRadius },
                { id: 'proximaD', parent: starObjects.proxima, rad: PLANET_DATA.proximaD.orbitRadius },
                { id: 'alphaAb', parent: starObjects.alphaA, rad: PLANET_DATA.alphaAb.orbitRadius },
            ];

            orbitParents.forEach(({ id, parent, rad }) => {
                const line = planetOrbitRefs[id];
                if (!line) return;
                const pos = parent.position;
                const pts = [];
                const segs = 80;
                for (let i = 0; i <= segs; i++) {
                    const t = (i / segs) * Math.PI * 2;
                    const x = rad * Math.cos(t);
                    const z = rad * Math.sin(t);
                    pts.push(new THREE.Vector3(x + pos.x, pos.y, z + pos.z));
                }
                line.geometry.dispose();
                line.geometry = new THREE.BufferGeometry().setFromPoints(pts);
            });

            // Update labels
            const labelPositions = {
                alphaA: starObjects.alphaA.position,
                alphaB: starObjects.alphaB.position,
                proxima: starObjects.proxima.position,
                proximaB: planetObjects.proximaB.position,
                proximaD: planetObjects.proximaD.position,
                alphaAb: planetObjects.alphaAb.position,
            };

            for (const [id, label] of Object.entries(labelRefs)) {
                const pos = labelPositions[id];
                if (pos) {
                    label.position.copy(pos);
                    label.position.y += 1.2;
                    const dist = camera.position.distanceTo(pos);
                    const scale = Math.max(0.8, Math.min(3.5, 35 / dist));
                    label.scale.set(scale * 1.5, scale * 0.45, 1);
                }
            }

            // Twinkle stars
            starField.material.uniforms.uTime.value = elapsed;

            // Camera Modes
            if (state.camMode === 'follow' && state.followTarget) {
                const target = state.followTarget.position;
                controls.target.lerp(target, 0.04);
                const offset = new THREE.Vector3(4, 2.5, 5);
                const desiredPos = target.clone().add(offset);
                camera.position.lerp(desiredPos, 0.03);
            } else if (state.camMode === 'cinematic') {
                state.cinematicPhase += delta * 0.04 * state.speed;
                const radius = 28 + 8 * Math.sin(state.cinematicPhase * 0.2);
                const height = 10 + 6 * Math.sin(state.cinematicPhase * 0.15 + 0.7);
                const angle = state.cinematicPhase;
                const target = new THREE.Vector3(2 * Math.sin(angle * 0.1), 0, 2 * Math.cos(angle * 0.1));
                controls.target.lerp(target, 0.02);
                camera.position.set(radius * Math.sin(angle) + target.x, height + target.y, radius * Math.cos(angle) + target.z);
            } else if (state.camMode === 'first') {
                const target = starObjects.alphaA.position;
                controls.target.lerp(target, 0.05);
                const offset = new THREE.Vector3(1.8, 0.8, 2.5);
                const desiredPos = target.clone().add(offset);
                camera.position.lerp(desiredPos, 0.04);
            }

            controls.update();
            ringMesh.lookAt(camera.position);
            composer.render();
        }

        window.addEventListener('resize', () => {
            const w = window.innerWidth;
            const h = window.innerHeight;
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);
            composer.setSize(w, h);
        });

        setTimeout(() => {
            document.getElementById('loading').classList.add('hidden');
        }, 800);

        animate();
    </script>
</body>
</html>
